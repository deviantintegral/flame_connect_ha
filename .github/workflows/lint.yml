name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

# IMPORTANT: Keep HA_VERSION synchronized across all workflow files:
# - copilot-setup-steps.yml
# - lint.yml
# - test.yml

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
          cache-dependency-glob: "**/requirements*.txt"

      - name: Get Home Assistant version
        id: ha_version
        run: |
          HA_VERSION=$(grep '"homeassistant"' hacs.json | head -1 | sed 's/.*"homeassistant"\s*:\s*"\([^"]*\)".*/\1/')
          echo "HA_VERSION=${HA_VERSION}" >> $GITHUB_OUTPUT
          echo "Home Assistant version: ${HA_VERSION}"

      - name: Cache Home Assistant installation
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            .local/ha-venv
          key: ha-venv-${{ runner.os }}-py3.14-ha${{ steps.ha_version.outputs.HA_VERSION }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ha-venv-${{ runner.os }}-py3.14-ha${{ steps.ha_version.outputs.HA_VERSION }}-
            ha-venv-${{ runner.os }}-py3.14-

      - name: Install requirements
        run: script/setup/bootstrap

      - name: Lint check
        run: script/lint-check

      - name: Type check
        run: script/type-check
